<!DOCTYPE html>
<html>
<head>
    <title>Expenses</title>
    <link rel="stylesheet" href="/style.css">
    
</head>
<body>
<script>

if(sessionStorage.getItem("loggedIn") != "true"){

    window.location.href="/login.html";

}

</script>
<nav class="navbar">

    <a href="/">🏠 Home</a>

    <a href="/userspage">👤 Users</a>

    <a href="/expensespage">💰 Expenses</a>

    <a href="/transactionspage">📜 Transactions</a>

    <a href="/dashboardpage">📊 Dashboard</a>

    <a href="/balancepage">⚖ Balance</a>

    <a href="#" onclick="logout()">🚪 Logout</a>

    <button onclick="toggleTheme()" id="themeBtn">
    🌙 Dark Mode
</button>

</nav>

<h1>💰 Expenses</h1>

<div class="container">

    <input type="number" id="amount" placeholder="Amount">

    <br><br>

    <label><b>Paid By:</b></label>

    <select id="payerId">
    </select>

    <br><br>

<label><b>Category:</b></label>

<select id="category">

    <option value="Food">🍔 Food</option>

    <option value="Travel">✈ Travel</option>

    <option value="Shopping">🛍 Shopping</option>

    <option value="Entertainment">🎬 Entertainment</option>

    <option value="Bills">💡 Bills</option>

    <option value="Others">📂 Others</option>

</select>

 <br><br>

    <h3>Split Between</h3>

    <div id="participants">
    </div>

    <br>

    <button onclick="addExpense()">Add Expense</button>

    <br><br>

    <input
    type="text"
    id="searchExpense"
    placeholder="🔍 Search Expense By Name"
    onkeyup="loadExpenses()">

<br><br>


    <h2>All Expenses</h2>

    <ul id="expenseList"></ul>

</div>

<script>

function addExpense() {

    let amount = document.getElementById("amount").value;
    let payerId = document.getElementById("payerId").value;
    let category= document.getElementById("category").value;

    let selectedUsers = [];

    document.querySelectorAll(".participant:checked")
    .forEach(box => {

        selectedUsers.push(Number(box.value));

    });

    fetch("/expenses", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({

            amount: amount,
            category: category,
            groupId: 1,

            paidBy: {
                id: payerId
            },

            splitBetween: selectedUsers

        })

    })
    .then(response => response.json())
    .then(data => {

        showToast("✅ Expense Added Successfully");

        document.getElementById("amount").value = "";

        loadExpenses();

    });

}

function loadUsers() {

    fetch("/users")
    .then(response => response.json())
    .then(users => {

        let dropdown = document.getElementById("payerId");
        let participantsDiv = document.getElementById("participants");

        dropdown.innerHTML = "";
        participantsDiv.innerHTML = "";

        users.forEach(user => {

            dropdown.innerHTML +=
            `
            <option value="${user.id}">
                ${user.name}
            </option>
            `;

            participantsDiv.innerHTML +=
            `
            <div class="checkbox-item">

                <input
                    type="checkbox"
                    class="participant"
                    value="${user.id}"
                    checked>

                <label>${user.name}</label>

            </div>
            `;
        });

    });

}

function loadExpenses() {

fetch("/expenses")
.then(response => response.json())
.then(expenses => {

    let list = document.getElementById("expenseList");

    list.innerHTML = "";

    let searchText =
        document.getElementById("searchExpense")
        .value
        .toLowerCase();

    expenses.forEach(expense => {

        let payerName = expense.paidBy.name;

        if (payerName.toLowerCase().includes(searchText)) {

            let dateTime = new Date(expense.createdAt);

            let formattedDate =
                dateTime.toLocaleString(
                    "en-IN",
                    {
                        day: "2-digit",
                        month: "short",
                        year: "numeric",
                        hour: "2-digit",
                        minute: "2-digit"
                    }
                );

            list.innerHTML +=
            `
            <li>

                <div>

                    <h3>

₹${expense.amount}

- ${payerName}

(${expense.category})

</h3>

                    <small>
                        📅 ${formattedDate}
                    </small>

                </div>

                <div>

                    <button onclick="editExpense(
                        ${expense.id},
                        ${expense.amount},
                        ${expense.paidBy.id})">

                        ✏ Edit

                    </button>

                    <button onclick="deleteExpense(${expense.id})">

                        🗑 Delete

                    </button>

                </div>

            </li>

            <br>
            `;

        }

    });

});


}


function editExpense(id, amount, payerId) {

    let newAmount = prompt("Enter new amount:", amount);

    if (newAmount == null) {

        return;

    }

    let selectedUsers = [];

    document.querySelectorAll(".participant:checked")
    .forEach(box => {

        selectedUsers.push(Number(box.value));

    });

    fetch("/expenses/" + id, {

        method: "PUT",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({

            amount: newAmount,
            groupId: 1,

            paidBy: {
                id: payerId
            },

            splitBetween: selectedUsers

        })

    })
    .then(response => response.json())
    .then(data => {

        showToast("✏ Expense Updated Successfully");

        loadExpenses();

    });

}

function deleteExpense(id) {

    if (!confirm("Delete this expense?")) {

        return;

    }

    fetch("/expenses/" + id, {

        method: "DELETE"

    })
    .then(response => response.text())
    .then(data => {

        showToast(data);

        loadExpenses();

    });

}

loadUsers();
loadExpenses();

function logout(){

    sessionStorage.removeItem("loggedIn");

    window.location.href="/login.html";

}

function showToast(message){

    let toast = document.getElementById("toast");

    toast.innerHTML = message;

    toast.classList.add("show");

    setTimeout(() => {

        toast.classList.remove("show");

    },3000);

}
</script>
<div id="toast"></div>
<script>

function toggleTheme(){

    document.body.classList.toggle("light-mode");

    if(document.body.classList.contains("light-mode")){

        localStorage.setItem(

            "theme",

            "light"

        );

        document.getElementById("themeBtn")
        .innerHTML =
        "☀ Light Mode";

    }

    else{

        localStorage.setItem(

            "theme",

            "dark"

        );

        document.getElementById("themeBtn")
        .innerHTML =
        "🌙 Dark Mode";

    }

}



window.onload = function(){

    if(localStorage.getItem("theme")=="light"){

        document.body.classList.add(

            "light-mode"

        );

        document.getElementById("themeBtn")
        .innerHTML =
        "☀ Light Mode";

    }

}

</script>
</body>
</html>
